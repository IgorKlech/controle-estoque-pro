<!DOCTYPE html>
<html>
<head>
    <title>Controle de Estoque</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            overflow: hidden;
        }
        header { 
            background: linear-gradient(135deg, #2563eb, #1d4ed8); 
            color: white; 
            padding: 25px; 
            text-align: center; 
        }
        .content { padding: 30px; }
        .form-section { 
            background: #f8fafc; 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border-left: 5px solid #2563eb;
        }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 15px; 
            transition: all 0.3s; 
        }
        input:focus { 
            outline: none; 
            border-color: #2563eb; 
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); 
        }
        .btn { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.3s; 
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); }
        .btn:disabled { background: #6b7280; cursor: not-allowed; transform: none; }
        #resultado { 
            margin: 20px 0; 
            padding: 20px; 
            border-radius: 8px; 
            font-weight: 500; 
            display: none; 
        }
        .sucesso { background: #d1fae5; color: #065f46; border-left: 5px solid #10b981; }
        .erro { background: #fee2e2;}
